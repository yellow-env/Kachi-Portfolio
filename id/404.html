<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found | Halaman Tidak Ditemukan</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💻</text></svg>"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #0f0f0f;
        color: #ffffff;
        font-family: "Segoe UI", "DM Sans", sans-serif;
        min-height: 100vh;
        overflow: hidden;
        position: relative;
      }

      /* Animated Background - Yellow Particles */
      canvas#bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
      }

      .container {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        text-align: center;
        max-width: 700px;
        margin: 0 auto;
      }

      .icon {
        font-size: 5rem;
        margin-bottom: 1.5rem;
        color: #ffd700;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.05);
          opacity: 0.8;
        }
      }

      h1 {
        font-size: 4rem;
        margin-bottom: 1rem;
        background: linear-gradient(90deg, #ffd700, #ffc107);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        font-weight: 800;
      }

      .text-en {
        font-size: 1.3rem;
        margin-bottom: 0.5rem;
        color: #e0e0e0;
        opacity: 0;
        animation: fadeIn 1s 0.5s forwards;
      }

      .text-id {
        font-size: 1.3rem;
        margin-bottom: 2rem;
        color: #bdbdbd;
        opacity: 0;
        animation: fadeIn 1s 0.7s forwards;
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 0.8rem 1.8rem;
        background: rgba(255, 193, 7, 0.15);
        color: #ffd700;
        text-decoration: none;
        border: 1px solid #ffc107;
        border-radius: 8px;
        font-weight: 600;
        transition: all 0.3s ease;
        opacity: 0;
        animation: fadeIn 1s 1s forwards;
      }

      .btn:hover {
        background: rgba(255, 193, 7, 0.3);
        transform: translateY(-3px);
        box-shadow: 0 6px 16px rgba(255, 193, 7, 0.2);
      }

      .footer {
        margin-top: 2.5rem;
        font-size: 0.9rem;
        color: #666;
        opacity: 0;
        animation: fadeIn 1s 1.3s forwards;
      }

      /* Responsive */
      @media (max-width: 600px) {
        h1 {
          font-size: 3rem;
        }
        .text-en,
        .text-id {
          font-size: 1.1rem;
        }
        .icon {
          font-size: 4rem;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="bg"></canvas>

    <div class="container">
      <div class="icon">
        <i class="fas fa-exclamation-triangle"></i>
      </div>
      <h1>404</h1>
      <p class="text-en">Oops! The page you're looking for doesn't exist.</p>
      <p class="text-id">Ups! Halaman yang kamu cari tidak ditemukan.</p>
      <a href="../en/" class="btn">
        <i class="fas fa-home"></i> Back to Home / Kembali ke Beranda
      </a>
      <div class="footer">© 2025 Kachi • Web Developer & Animator</div>
    </div>

    <script>
      // Simple animated background with yellow particles
      const canvas = document.getElementById("bg");
      const ctx = canvas.getContext("2d");

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();

      const particles = [];
      const particleCount = Math.min(50, Math.floor(window.innerWidth / 20));

      class Particle {
        constructor() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.size = Math.random() * 2 + 0.5;
          this.speedX = Math.random() * 0.6 - 0.3;
          this.speedY = Math.random() * 0.6 - 0.3;
          this.opacity = Math.random() * 0.4 + 0.1;
        }

        update() {
          this.x += this.speedX;
          this.y += this.speedY;

          if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
          if (this.y > canvas.height || this.y < 0) this.speedY *= -1;
        }

        draw() {
          ctx.fillStyle = `rgba(255, 215, 0, ${this.opacity})`;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
      }

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(15, 15, 15, 0.1)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let p of particles) {
          p.update();
          p.draw();
        }

        requestAnimationFrame(animate);
      }

      animate();
    </script>
  </body>
</html>
